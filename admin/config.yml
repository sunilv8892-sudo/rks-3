backend:
  name: github
  repo: sunilv8892-sudo/rks-3
  branch: main
  base_url: https://rks-3-67g2.vercel.app
  auth_endpoint: /auth
  site_domain: rks-3

media_folder: images/uploads
public_folder: /images/uploads

publish_mode: simple

collections:
  - name: committee
    label: Committee
    folder: content/committee
    create: true
    slug: "{{slug}}"
    identifier_field: name
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Role, name: role, widget: string }
      - { label: Photo, name: photo, widget: image }

  - name: gallery
    label: Gallery
    folder: content/gallery
    create: true
    slug: "{{slug}}"
    identifier_field: caption
    fields:
      - { label: Image, name: image, widget: image }
      - { label: Caption, name: caption, widget: string }

  - name: facilities
    label: Facilities Cards
    folder: content/facilities
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: Place Name, name: title, widget: string }
      - { label: Photo, name: photo, widget: image }
      - { label: Description, name: description, widget: text }

  - name: pages
    label: Pages
    files:
      - label: Home
        name: home
        file: content/home.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }
      - label: About Us
        name: about
        file: content/about.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }
      - label: Facilities
        name: facilities
        file: content/facilities.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }
      - label: Terms and Conditions
        name: terms
        file: content/terms.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }
      - label: Contact Us
        name: contact
        file: content/contact.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }

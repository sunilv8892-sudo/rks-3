backend:
  name: github
  repo: sunilv8892-sudo/rks-3
  branch: main
  base_url: https://rks-3.vercel.app
  auth_endpoint: api/cms/auth

media_folder: images/uploads
public_folder: /images/uploads
publish_mode: simple

collections:
  - name: pages
    label: Pages
    files:
      - label: Home
        name: home
        file: content/home.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }
      - label: About
        name: about
        file: content/about.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }
      - label: Facilities Page
        name: facilities
        file: content/facilities.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Hero Photo, name: photo, widget: image, required: false }
          - { label: Content, name: body, widget: markdown }
      - label: Terms
        name: terms
        file: content/terms.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }
      - label: Contact
        name: contact
        file: content/contact.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }

  - name: committee
    label: Committee
    folder: content/committee
    create: true
    slug: "{{slug}}"
    identifier_field: name
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Role, name: role, widget: string }
      - { label: Bio, name: bio, widget: text }
      - { label: Photo, name: photo, widget: image, required: false }
      - { label: Notes, name: body, widget: markdown, required: false }

  - name: gallery
    label: Gallery
    folder: content/gallery
    create: true
    slug: "{{slug}}"
    identifier_field: caption
    fields:
      - { label: Image, name: image, widget: image }
      - { label: Caption, name: caption, widget: string }
      - { label: Notes, name: body, widget: markdown, required: false }

  - name: facility_cards
    label: Facility Cards
    folder: content/facilities
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Photo, name: photo, widget: image, required: false }
      - { label: Description, name: description, widget: text }
      - { label: Notes, name: body, widget: markdown, required: false }

backend:
  name: github
  repo: sunilv8892-sudo/rks-3
  branch: main
  base_url: __CMS_BASE_URL__
  auth_endpoint: api/cms/auth

media_folder: images/uploads
public_folder: /images/uploads
publish_mode: simple

collections:
  - name: pages
    label: Pages
    files:
      - label: Home
        name: home
        file: content/home.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }
      - label: About
        name: about
        file: content/about.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }
      - label: Facilities Page
        name: facilities
        file: content/facilities.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Hero Photo, name: photo, widget: image, required: false }
          - { label: Content, name: body, widget: markdown }
      - label: Terms
        name: terms
        file: content/terms.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }
      - label: Contact
        name: contact
        file: content/contact.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }

  - name: committee
    label: Committee
    folder: content/committee
    create: true
    slug: "{{slug}}"
    identifier_field: name
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Role, name: role, widget: string }
      - { label: Photo, name: photo, widget: image, required: false }
      - { label: Notes, name: body, widget: markdown, required: false }

  - name: gallery
    label: Gallery
    folder: content/gallery
    create: true
    slug: "{{slug}}"
    identifier_field: caption
    fields:
      - { label: Image, name: image, widget: image }
      - { label: Caption, name: caption, widget: string }
      - { label: Notes, name: body, widget: markdown, required: false }

  - name: facility_cards
    label: Facility Cards
    folder: content/facilities
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Photo, name: photo, widget: image, required: false }
      - { label: Description, name: description, widget: text }
      - { label: Notes, name: body, widget: markdown, required: false }

  - name: site_files
    label: Website Files (Advanced)
    editor:
      preview: false
    files:
      - label: Home HTML
        name: index_html
        file: index.html
        fields:
          - { label: HTML, name: body, widget: code, default_language: html, output_code_only: true }
      - label: About HTML
        name: about_html
        file: about.html
        fields:
          - { label: HTML, name: body, widget: code, default_language: html, output_code_only: true }
      - label: Facilities HTML
        name: facilities_html
        file: facilities.html
        fields:
          - { label: HTML, name: body, widget: code, default_language: html, output_code_only: true }
      - label: Gallery HTML
        name: gallery_html
        file: gallery.html
        fields:
          - { label: HTML, name: body, widget: code, default_language: html, output_code_only: true }
      - label: Committee HTML
        name: committee_html
        file: committee.html
        fields:
          - { label: HTML, name: body, widget: code, default_language: html, output_code_only: true }
      - label: Terms HTML
        name: terms_html
        file: terms.html
        fields:
          - { label: HTML, name: body, widget: code, default_language: html, output_code_only: true }
      - label: Contact HTML
        name: contact_html
        file: contact.html
        fields:
          - { label: HTML, name: body, widget: code, default_language: html, output_code_only: true }
      - label: Main JS
        name: app_js
        file: js/app.js
        fields:
          - { label: JavaScript, name: body, widget: code, default_language: javascript, output_code_only: true }
      - label: Main CSS
        name: css_main
        file: style.css
        fields:
          - { label: CSS, name: body, widget: code, default_language: css, output_code_only: true }
      - label: Secondary CSS
        name: css_secondary
        file: styles.css
        fields:
          - { label: CSS, name: body, widget: code, default_language: css, output_code_only: true }

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Tennis Club | CMS Admin</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Georgia, 'Times New Roman', serif;
            background: #f6efe4;
            color: #1f1a17;
        }

        .card {
            width: min(640px, 100%);
            padding: 28px;
            background: #fffaf2;
            border: 1px solid rgba(31, 26, 23, 0.12);
            border-radius: 18px;
            box-shadow: 0 16px 42px rgba(31, 26, 23, 0.1);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 2.8rem);
        }

        p {
            margin: 0 0 12px;
            line-height: 1.6;
            color: #6f6259;
        }

        a {
            color: #7c4d2a;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Loading CMS</h1>
        <p>Please wait while the dashboard initializes.</p>
    </main>

    <script>
        window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
        (async function bootstrapCMS() {
            try {
                const response = await fetch('/admin/config.yml', { cache: 'no-cache' });
                if (!response.ok) {
                    throw new Error('Could not load /admin/config.yml');
                }

                const rawConfig = await response.text();
                const runtimeBaseUrl = window.location.origin;

                const runtimeConfig = rawConfig
                    .replace('__CMS_BASE_URL__', runtimeBaseUrl)
                    .replace('__CMS_SITE_DOMAIN__', window.location.hostname);

                if (!window.CMS || typeof window.CMS.init !== 'function') {
                    throw new Error('Decap CMS failed to load');
                }

                window.CMS.init({ config: runtimeConfig });
            } catch (error) {
                console.error('Failed to initialize Decap CMS:', error);
                document.body.innerHTML = '';
                const box = document.createElement('main');
                box.className = 'card';
                box.innerHTML =
                    '<h1>CMS failed to load</h1>' +
                    '<p>Check admin/config.yml and API auth endpoints.</p>' +
                    '<p>Error: ' + (error.message || 'Unknown error') + '</p>';
                document.body.appendChild(box);
            }
        }());
    </script>
</body>
</html>

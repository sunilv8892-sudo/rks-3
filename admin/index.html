<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Tennis Club | CMS Admin</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <main class="admin-main">
        <div class="container">
            <section class="admin-card">
                <span class="eyebrow">Content Management</span>
                <h1 class="section-title">Garden Tennis Club CMS</h1>
                <p class="section-subtitle">Sign in with Netlify Identity to edit pages, committee members, and gallery items.</p>
            </section>
        </div>
    </main>

    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", function (user) {
                if (!user) {
                    window.netlifyIdentity.on("login", function () {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>

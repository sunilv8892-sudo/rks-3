<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Tennis Club | CMS Admin</title>
</head>
<body>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
        if (window.netlifyIdentity) {
            function openCmsHome() {
                window.location.replace('/admin/#/collections/pages');
            }

            function shouldNormalizeCmsRoute() {
                const hash = window.location.hash || '';
                const search = window.location.search || '';
                const source = `${search}${hash}`;

                if (!hash || hash === '#') return false;
                if (/^#\/login/.test(hash)) return true;
                if (/(invite_token|recovery_token|confirmation_token|email_change_token)/.test(source)) return true;
                return false;
            }

            function getIdentityView() {
                const hash = window.location.hash || '';
                const search = window.location.search || '';
                const source = `${search}${hash}`;

                if (/recovery_token/.test(source)) return 'recovery';
                if (/(invite_token|confirmation_token|email_change_token)/.test(source)) return 'signup';
                return 'login';
            }

            window.netlifyIdentity.on('init', function(user) {
                if (!user) {
                    window.netlifyIdentity.open(getIdentityView());
                    return;
                }

                if (shouldNormalizeCmsRoute()) {
                    openCmsHome();
                }
            });

            window.netlifyIdentity.on('login', function() {
                window.netlifyIdentity.close();
                openCmsHome();
            });

            window.netlifyIdentity.on('signup', function() {
                window.netlifyIdentity.close();
            });
        }
    </script>
</body>
</html>

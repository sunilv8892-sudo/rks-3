<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Tennis Club | CMS Admin</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #0f1116;
            color: #f4f4f4;
        }

        .admin-login-fallback {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .admin-login-fallback button {
            border: 0;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
            background: #f1c40f;
            color: #111;
        }

        .admin-login-fallback small {
            color: #d6d6d6;
        }
    </style>
</head>
<body>
    <div class="admin-login-fallback">
        <button id="open-login" type="button">Open Login</button>
        <small>If login does not appear automatically, click this button.</small>
    </div>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
        if (window.netlifyIdentity) {
            const openLoginButton = document.getElementById('open-login');

            function ensureLoginHash() {
                const currentHash = window.location.hash || '';
                if (!currentHash || currentHash === '#') {
                    window.location.hash = '/login';
                }
            }

            function getIdentityView() {
                const hash = window.location.hash || '';
                const search = window.location.search || '';
                const source = `${search}${hash}`;

                if (/recovery_token/.test(source)) return 'recovery';
                if (/(invite_token|confirmation_token|email_change_token)/.test(source)) return 'signup';
                return 'login';
            }

            function openIdentityLogin() {
                window.netlifyIdentity.open(getIdentityView());
            }

            window.netlifyIdentity.on('init', function(user) {
                if (!user) {
                    openIdentityLogin();
                }
            });

            window.netlifyIdentity.on('login', function() {
                window.netlifyIdentity.close();
            });

            window.netlifyIdentity.on('signup', function() {
                window.netlifyIdentity.close();
            });

            window.netlifyIdentity.on('error', function(error) {
                console.error('Netlify Identity error:', error);
            });

            if (openLoginButton) {
                openLoginButton.addEventListener('click', openIdentityLogin);
            }

            ensureLoginHash();

            window.netlifyIdentity.init();

            setTimeout(function() {
                if (!window.netlifyIdentity.currentUser()) {
                    openIdentityLogin();
                }
            }, 500);
        }
    </script>
</body>
</html>
